# microagent configuration. Everything non-secret lives here.
# Secrets (tokens, passwords) go in /config/.env — never here.
#
# The dashboard writes this file directly; a human can also edit by hand.
# Changes take effect on next restart.

agent_type = "claude"
agent_id = "primary"

[user]
name = ""

[agents.claude]
rotation_time = "03:00"

[dashboard]
enabled = true
host = "0.0.0.0"
port = 8767
public_url = ""

[interfaces.socket]
enabled = false
host = "0.0.0.0"
port = 8765

[interfaces.web_chat]
enabled = true

[interfaces.email]
enabled = false
username = ""
imap_host = "imap.gmail.com"
imap_port = 993
smtp_host = "smtp.gmail.com"
smtp_port = 587
allowed_senders = []

[interfaces.telegram]
enabled = false
allowed_chat_ids = []
# getUpdates long-poll timeout, in seconds. 30 = near-zero idle traffic,
# instant wakes when a message lands. Set to 0 to disable long-poll.
poll_timeout = 30

# Receive-only inputs (no `send` path) live under [sources.*].
# wake_on_event=false keeps a source passive: it runs in the background and
# buffers state, but the agent only sees it when it polls {name}_receive
# after being woken by something else. Set true to wake on every new event.
# Defaults differ per source — imessage is passive, cron wakes by design.
[sources.imessage]
enabled = false
wake_on_event = false
db_path = "/mnt/imessage/chat.db"

# Agent-schedulable wakes (cron_wake_in / _at / _daily MCP tools).
# The caps bound how much the agent can spend on self-scheduled wakes.
[sources.cron]
enabled = false
wake_on_event = true
max_active = 8
min_delay_seconds = 60
max_fires_per_day = 24

services:
  microagent:
    build: .
    container_name: microagent
    restart: unless-stopped
    ports:
      - "8765:8765"
    volumes:
      - ./soul:/soul:ro
      - agent-data:/data
    environment:
      - SOUL_DIR=/soul
      - DATA_DIR=/data
      # OAuth token for the Claude SDK. Get one with:
      #   docker compose run --rm -it microagent claude setup-token
      # Copy the value from the printed `export CLAUDE_CODE_OAUTH_TOKEN=...`
      # line into a .env file next to docker-compose.yml as:
      #   CLAUDE_CODE_OAUTH_TOKEN=sk-ant-oat01-...
      - CLAUDE_CODE_OAUTH_TOKEN=${CLAUDE_CODE_OAUTH_TOKEN:-}
      - EMAIL_PASSWORD=${EMAIL_PASSWORD:-}

volumes:
  agent-data:

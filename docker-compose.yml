services:
  microagent:
    build: .
    container_name: microagent
    restart: unless-stopped
    ports:
      - "8765:8765"   # socket interface
      - "8767:8767"   # dashboard
    env_file: ${XDG_CONFIG_HOME:-${HOME}/.config}/microagent/.env
    volumes:
      - .:/repo                                        # source tree
      - ${XDG_CONFIG_HOME:-${HOME}/.config}/microagent:/config  # config + .env + soul.md
      - agent-state:/state                             # harness state
      - agent-space:/space                             # agent scratch (cwd)
      - ${HOME}/Library/Messages:/mnt/imessage:ro      # iMessage read-only feed
    environment:
      # Claude CLI refuses --dangerously-skip-permissions as root; this env
      # marks the process as sandboxed (the container is our sandbox) so
      # permission_mode="bypassPermissions" works.
      - IS_SANDBOX=1

  # Optional: exposes the dashboard publicly via Cloudflare Tunnel.
  # Set CLOUDFLARED_TOKEN in .env (from Cloudflare Zero Trust → Tunnels) and
  # run `docker compose --profile public up -d` to start it.
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: microagent-cloudflared
    restart: unless-stopped
    command: tunnel --no-autoupdate run --token ${CLOUDFLARED_TOKEN}
    depends_on:
      - microagent
    profiles:
      - public

volumes:
  agent-state:
  agent-space:
